    <h1 style="text-align: center;color: red;">我要揪團</h1>






        <h2>請選擇一種飲料：</h2>
        <select id="eighttea-menu"></select>
        <p>價格：<span id="eighttea-price"></span>元</p>

        <script>
            //下列處理飲料Option內容

            //宣告一個變數叫做selecteighttea
            // 並賦予一個內容物，也是一個id 叫做 eighttea-menu
            //由於原本的是id,要變成物件，所以加個事件監聽事件$()來改變性質
            var selecteighttea = $("#eighttea-menu");

            // 另外我要從陣列eighteas.eighteas裡面,把每個 “飲料物件” 叫出來
            //這個功能的參數叫做eighttea
            //每當呼叫 “飲料物件” 出來時，我會執行後面的功能
            eightteas.eightteas.forEach(function(eighttea){
                //這個功能是創建新的下拉清單，並將設定選項的名字改為飲料名，值改為飲料價格
                selecteighttea.append($("<option>").text(eighttea.name).val(eighttea.price));
            });
            // 當我這個選擇發生變化時，執行一個功能
            selecteighttea.on("change", function() {
                //這功能會取得我所選取的 "這個飲料"的"價格"
                var selectedeightteaPrice = $(this).val();
                //將所選的飲料價格顯示在id為eighttea-price的<p>中
                $("#eighttea-price").text(selectedeightteaPrice);
            });
        </script>
